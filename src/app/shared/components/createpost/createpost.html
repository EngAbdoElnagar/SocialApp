<div class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
  <div class="mb-3 flex items-start gap-3">
    <img [alt]="userName" class="size-11 rounded-full object-cover" [src]="userPhoto" />
    <div class="flex-1">
      <p class="text-base font-extrabold text-slate-900">{{ userName }}</p>
      
      <div
        class="mt-1 inline-flex items-center gap-2 rounded-full bg-slate-100 px-2 py-0.5 text-xs font-semibold text-slate-700"
      >
        <i class="fa-solid fa-earth-americas"></i>
        <select class="bg-transparent border-none outline-none px-1 py-1 text-xs">
          <option value="public">Public</option>
          <option value="following">Followers</option>
          <option value="only_me">Only me</option>
        </select>
      </div>
    </div>
  </div>
  <form (submit)="createPost($event)">
    <div class="relative">
      <textarea
        [formControl]="postDescription"
        #postInput
        [(ngModel)]="postText"
        rows="4"
        placeholder="What's on your mind, Lisandra?"
        class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-[17px] leading-relaxed text-slate-800 outline-none transition focus:border-[#1877f2] focus:bg-white"
      ></textarea>
    </div>
    @if (imagePreview) {
      <div class="relative mt-2 rounded-xl overflow-hidden border border-slate-200">
        <button
          type="button"
          (click)="removeImage()"
          class="absolute right-2 top-2 z-10 flex h-8 w-8 items-center justify-center rounded-full bg-black/50 text-white transition hover:bg-black/70"
        >
          <i class="fa-solid fa-xmark"></i>
        </button>

        <img [src]="imagePreview" class="w-full object-cover max-h-80" alt="Preview" />
      </div>
    }

    <!-- ??????????????????????????????????????????????? -->
    <div class="mt-3 flex flex-wrap items-center justify-between gap-2 border-t border-border pt-3">
      <div class="relative flex items-center gap-2">
        <label
          class="flex cursor-pointer items-center gap-2 rounded-lg px-3 py-2 text-sm font-semibold text-slate-600 transition hover:bg-slate-100"
        >
          <i class="fa-regular fa-image text-emerald-600"></i>
          <span class="hidden sm:inline">Photo/video</span
          ><input
            (change)="prepareUploadedFile($event)"
            accept="image/*"
            class="hidden"
            type="file" /></label
        ><button
          (click)="toggleEmojiPicker()"
          type="button"
          class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-semibold text-slate-600 transition hover:bg-slate-100"
        >
          <i class="fa-regular fa-face-smile text-amber-500"></i>
          <span class="hidden sm:inline">Feeling/activity</span>
        </button>
        <!-- ??????????????????????????????? -->
        @if (showEmojiPicker) {
          <div class="absolute top-12 z-50">
            <emoji-picker (emoji-click)="addEmoji($event)"></emoji-picker>
          </div>
        }
      </div>
      <div class="flex items-center gap-3">
        <button
          [disabled]="isPostDisabled || isUploading "
          
          class="flex items-center gap-2 rounded-lg bg-[#1877f2] px-5 py-2 text-sm font-extrabold text-white shadow-sm transition-colors hover:bg-[#166fe5] cursor-pointer disabled:opacity-60 disabled:cursor-not-allowed"
        >
          @if (isUploading) {
            Posting...
            <i class="fa-regular fa-paper-plane"></i>
          } @else {
            Post
            <i class="fa-regular fa-paper-plane"></i>
          }
        </button>
      </div>
    </div>
  </form>
</div>
