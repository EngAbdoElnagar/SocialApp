<nav class="bg-neutral-primary fixed w-full z-1000 top-0 start-0 border-b border-default">
  <div class=" max-w-7xl flex flex-wrap items-center justify-between mx-auto p-4">
    <a routerLink="timeline" class="flex items-center space-x-3 rtl:space-x-reverse">
      <div class="titli flex gap-2">
        <div class="img">
          <img
            class="size-9 rounded-xl object-cover"
            src="images/route.png"
            alt="images/route.png"
          />
        </div>
        <span
          class="hidden sm:block self-center text-xl font-extrabold text-slate-900 whitespace-nowrap"
          >Route Posts</span
        >
      </div>
    </a>
    <div class="navLinks ">
      <ul class="flex items-center gap-2 rounded-2xl border border-slate-200 bg-slate-50/90 px-1 py-1 sm:px-1.5">
        <li
        routerLink="timeline" routerLinkActive="bg-white text-[#1f6fe5]" 
        class="flex rounded-xl px-2.5 py-2 text-sm font-extrabold transition sm:gap-2 sm:px-3.5 ">
          <div class="icon"><i class="fa-regular fa-house"></i></div>
          <a routerLink="timeline" routerLinkActive="bg-white text-[#1f6fe5]"  class="hidden sm:block">Feed</a>
        </li>
        
        <li
         routerLink="profile" routerLinkActive="bg-white text-[#1f6fe5]"
        class="flex rounded-xl px-2.5 py-2 text-sm font-extrabold transition sm:gap-2 sm:px-3.5 text-slate-600 hover:bg-white/90 hover:text-slate-900">
          <div class="icon"><i class="fa-regular fa-user"></i></div>
          <a routerLink="profile" routerLinkActive="bg-white text-[#1f6fe5]" class="hidden sm:block">profile</a>
        </li>
        <li
         routerLink="notification" routerLinkActive="bg-white text-[#1f6fe5]" 
        class="flex rounded-xl px-2.5 py-2 text-sm font-extrabold transition sm:gap-2 sm:px-3.5 text-slate-600 hover:bg-white/90 hover:text-slate-900">
          <div class="icon"><i class="fa-regular fa-comment"></i></div>
          <a routerLink="notification" routerLinkActive="bg-white text-[#1f6fe5]"  class="hidden sm:block">Notifications</a>
        </li>
      </ul>
    </div>

    <div class="flex items-center md:order-2 space-x-3 md:space-x-0 rtl:space-x-reverse">
      <button
        type="button"
        class="flex text-sm bg-neutral-primary rounded-full md:me-0 focus:ring-4 focus:ring-neutral-tertiary"
        id="user-menu-button"
        aria-expanded="false"
        data-dropdown-toggle="user-dropdown"
        data-dropdown-placement="bottom"
      >
        <span class="sr-only">Open user menu</span>
        
        <div
          class="flex gap-2 items-center border border-slate-200 rounded-full p-1 bg-slate-50 hover:bg-slate-100 transition  cursor-pointer"
        >
          <img class="w-8 h-8 rounded-full" [src]="(userData$ | async)?.photo" alt="user photo" />
          <p class="hidden md:block truncate text-sm font-semibold text-slate-800">
            {{userName}}
            <!-- Lisandra Workman -->
          </p>
          <div class="icon"><i class="fa-solid fa-bars text-slate-400"></i></div>
        </div>
      </button>
      <!-- Dropdown menu -->
      <div
        class="z-50 hidden bg-neutral-primary-medium border border-default-medium rounded-base shadow-lg w-44"
        id="user-dropdown"
      >
        <ul
          class="p-2 text-sm border-b border-default text-body font-medium"
          aria-labelledby="user-menu-button"
        >
          <li>
            <a
              routerLink="profile"
              class="inline-flex items-center w-full p-2 hover:bg-neutral-tertiary-medium hover:text-heading rounded"
              ><i class="fa-regular fa-user"></i>
              <p class="ps-2">Profile</p>
            </a>
          </li>

          <li>
            <a
              routerLink="settings"
              class="inline-flex items-center w-full p-2 hover:bg-neutral-tertiary-medium hover:text-heading rounded"
              ><i class="fa-solid fa-gear"></i>
              <p class="ps-2">Settings</p>
            </a>
          </li>
        </ul>
        <ul class="p-2 text-sm text-body font-medium" aria-labelledby="user-menu-button">
          <li>
            <a (click)="logout()"
              
              class="inline-flex items-center w-full p-2 text-rose-600 hover:bg-rose-50 rounded cursor-pointer"
            >
              Logout
            </a>
          </li>
        </ul>
      </div>
    </div>
  </div>
</nav>
